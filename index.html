<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#03060d">
<title>INSIGNIA SIX — Summon</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#03060d;--text:#c8daf0;--muted:#3a5068;
  --mio:#f0f4ff;--pena-light:#4a8edb;--vania:#7ab8f5;
  --mizu:#9eaab8;--pulu:#3ecf6a;--al-light:#888;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

.grid-bg{position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(20,60,120,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(20,60,120,.07) 1px,transparent 1px);
  background-size:36px 36px;}
.grid-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 20%,var(--bg) 75%);}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:.3;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);}

.main{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
.sys-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.title{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,7vw,2.4rem);font-weight:800;letter-spacing:2px;color:#e8f0ff;margin-bottom:2px;}
.subtitle{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:3px;margin-bottom:28px;}

.cmd-line{display:flex;align-items:center;gap:8px;background:rgba(10,22,40,.85);border:1px solid rgba(74,142,219,.22);border-radius:12px;padding:13px 15px;backdrop-filter:blur(12px);width:min(480px,100%);margin-bottom:10px;}
.prompt{font-family:'Share Tech Mono',monospace;color:#4a8edb;font-size:13px;flex-shrink:0;}
#codeInput{flex:1;min-width:0;background:none;border:none;outline:none;font-family:'Share Tech Mono',monospace;font-size:16px;color:#e8f0ff;letter-spacing:4px;text-transform:uppercase;caret-color:#4a8edb;}
#codeInput::placeholder{color:var(--muted);letter-spacing:1px;font-size:12px;}
.enter-hint{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0;}

#status{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);height:18px;text-align:center;margin-bottom:18px;width:min(480px,100%);}

.char-pills{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(480px,100%);}
@media(min-width:440px){.char-pills{grid-template-columns:repeat(6,1fr);}}
.pill{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;padding:13px 4px;border-radius:10px;border:1px solid;cursor:pointer;transition:all .15s;opacity:.55;text-align:center;user-select:none;}
.pill:active{opacity:1;transform:scale(.96);}
@media(hover:hover){.pill:hover{opacity:1;transform:scale(1.04);}}
.pill-mio{color:var(--mio);border-color:rgba(240,244,255,.25);background:rgba(240,244,255,.04);}
.pill-pena{color:var(--pena-light);border-color:rgba(74,142,219,.35);background:rgba(26,74,138,.07);}
.pill-vania{color:var(--vania);border-color:rgba(122,184,245,.28);background:rgba(122,184,245,.05);}
.pill-mizu{color:var(--mizu);border-color:rgba(158,170,184,.28);background:rgba(158,170,184,.04);}
.pill-pulu{color:var(--pulu);border-color:rgba(62,207,106,.28);background:rgba(62,207,106,.05);}
.pill-al{color:var(--al-light);border-color:rgba(120,120,120,.3);background:rgba(80,80,80,.06);}

/* STAGE */
#stage{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,6,13,.93);backdrop-filter:blur(6px);padding:20px 16px;overflow-y:auto;}
#stage.active{display:flex;}
.close-btn{position:fixed;top:16px;right:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);cursor:pointer;border:1px solid rgba(100,130,160,.3);padding:9px 14px;border-radius:8px;transition:all .2s;z-index:10;background:rgba(10,22,40,.8);}
.close-btn:active{color:#e8f0ff;border-color:rgba(200,218,240,.4);}

.holo-wrap{position:relative;width:min(260px,68vw);height:min(260px,68vw);display:flex;align-items:center;justify-content:center;margin-bottom:20px;flex-shrink:0;}
.holo-symbol{position:relative;z-index:5;width:55%;height:55%;opacity:0;filter:drop-shadow(0 0 16px currentColor);transition:opacity .3s;}
.holo-symbol.visible{opacity:1;animation:symbolFlicker 4s ease-in-out infinite;}
@keyframes symbolFlicker{0%,100%{opacity:1;filter:drop-shadow(0 0 16px currentColor) drop-shadow(0 0 36px currentColor);}92%{opacity:1;}93%{opacity:.5;}94%{opacity:1;}97%{opacity:.75;}98%{opacity:1;}}

.holo-scan{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:0;top:0;}
@keyframes scanMove{0%{top:0;opacity:.5;}100%{top:100%;opacity:0;}}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;opacity:0;}
@keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:.9;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
@keyframes ringExpand{0%{transform:scale(.2);opacity:.7;}100%{transform:scale(1.5);opacity:0;}}
@keyframes ringRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes ringRotateCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}

.char-info{text-align:center;opacity:0;transform:translateY(10px);transition:all .5s ease;max-width:320px;width:100%;}
.char-info.visible{opacity:1;transform:translateY(0);}
.char-latin{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:5px;text-transform:uppercase;opacity:.5;margin-bottom:6px;}
.aksara-wrap{height:40px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.char-role{font-family:'Syne',sans-serif;font-size:clamp(.95rem,4vw,1.1rem);font-weight:700;margin-bottom:4px;}
.char-tagline{font-size:13px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto;}

.transmission{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);white-space:nowrap;overflow:hidden;z-index:5;}
.error-flash{position:fixed;inset:0;background:rgba(255,30,30,.04);pointer-events:none;opacity:0;z-index:300;transition:opacity .1s;}
.error-flash.show{opacity:1;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scanlines"></div>
<div class="error-flash" id="errorFlash"></div>

<div class="main">
  <div class="sys-label">// INSIGNIA SIX · SUMMON PROTOCOL</div>
  <div class="title">PANGGIL INSIGNIA</div>
  <div class="subtitle">[ KETIK ATAU TAP KARAKTER ]</div>
  <div class="cmd-line">
    <span class="prompt">SYS:~$</span>
    <input id="codeInput" type="text" maxlength="6" placeholder="ketik kode..." autocomplete="off" spellcheck="false" inputmode="text">
    <span class="enter-hint">[↵]</span>
  </div>
  <div id="status"></div>
  <div class="char-pills">
    <div class="pill pill-mio" onclick="summon('MIO')">MIO</div>
    <div class="pill pill-pena" onclick="summon('PENA')">PENA</div>
    <div class="pill pill-vania" onclick="summon('VANIA')">VANIA</div>
    <div class="pill pill-mizu" onclick="summon('MIZU')">MIZU</div>
    <div class="pill pill-pulu" onclick="summon('PULU')">PULU</div>
    <div class="pill pill-al" onclick="summon('AL')">AL</div>
  </div>
</div>

<div id="stage">
  <div class="close-btn" onclick="closeStage()">✕ DISMISS</div>
  <div class="holo-wrap" id="holoWrap">
    <div class="holo-scan" id="holoScan"></div>
    <svg class="holo-symbol" id="holoSymbol" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="char-info" id="charInfo">
    <div class="char-latin" id="charLatin"></div>
    <div class="aksara-wrap">
      <svg id="aksaraSvg" viewBox="0 0 300 48" height="40" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="char-role" id="charRole"></div>
    <div class="char-tagline" id="charTagline"></div>
  </div>
  <div class="transmission" id="transmission"></div>
</div>

<script>
// ── AUDIO ENGINE ──
let audioCtx = null;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function osc(ctx,type,freq,start,dur,gain,detune=0){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,start);
  if(detune)o.detune.setValueAtTime(detune,start);
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(gain,start+.06);
  g.gain.exponentialRampToValueAtTime(.0001,start+dur);
  o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+dur+.05);
}
function makeReverb(ctx,dur=2,decay=2){
  const len=ctx.sampleRate*dur,buf=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  const conv=ctx.createConvolver();conv.buffer=buf;return conv;
}

const sounds={
  // MIO — putih: kristal, angelic bell, ethereal shimmer
  MIO:(ctx)=>{
    const t=ctx.currentTime,rev=makeReverb(ctx,3,1.5),mg=ctx.createGain();
    mg.gain.setValueAtTime(.28,t);rev.connect(mg);mg.connect(ctx.destination);
    [[523.25,0,1.2],[659.25,.15,1.4],[783.99,.3,1.6],[1046.5,.5,1.2],[1318.5,.75,1.0],[523.25,1.1,.8]].forEach(([f,d,dr])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+d);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.4,t+d+.02);g.gain.exponentialRampToValueAtTime(.0001,t+d+dr);
      o.connect(g);g.connect(rev);o.start(t+d);o.stop(t+d+dr+.1);
    });
    [523.25,659.25,783.99].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t);o.detune.setValueAtTime(i*5,t);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.05,t+.4);g.gain.exponentialRampToValueAtTime(.0001,t+3);
      o.connect(g);g.connect(rev);o.start(t);o.stop(t+3.2);
    });
  },
  // PENA — biru tua: dalam, strategis, drone + ascending
  PENA:(ctx)=>{
    const t=ctx.currentTime,rev=makeReverb(ctx,2.5,2),mg=ctx.createGain();
    mg.gain.setValueAtTime(.3,t);rev.connect(mg);mg.connect(ctx.destination);
    const dr=ctx.createOscillator(),dg=ctx.createGain();
    dr.type='sine';dr.frequency.setValueAtTime(65.4,t);
    dg.gain.setValueAtTime(0,t);dg.gain.linearRampToValueAtTime(.35,t+.3);dg.gain.exponentialRampToValueAtTime(.0001,t+3.5);
    dr.connect(dg);dg.connect(rev);dr.start(t);dr.stop(t+4);
    [[146.8,.2,.9],[174.6,.5,.9],[195.9,.8,.9],[220,1.1,1.1],[261.6,1.5,1.4]].forEach(([f,d,dr])=>osc(ctx,'triangle',f,t+d,dr,.22));
    [0,.4,.8,1.2].forEach(d=>{
      const buf=ctx.createBuffer(1,ctx.sampleRate*.03,ctx.sampleRate),data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++)data[i]=Math.random()*(1-i/data.length)*.3;
      const src=ctx.createBufferSource(),g=ctx.createGain();
      src.buffer=buf;g.gain.setValueAtTime(.15,t+d);src.connect(g);g.connect(ctx.destination);src.start(t+d);
    });
  },
  // VANIA — biru muda: hangat, mengalir, vibrato sosial
  VANIA:(ctx)=>{
    const t=ctx.currentTime,rev=makeReverb(ctx,3,1.2),mg=ctx.createGain();
    mg.gain.setValueAtTime(.28,t);rev.connect(mg);mg.connect(ctx.destination);
    [[349.2,0,1.8,.08],[440,.2,1.8,.06],[523.25,.4,2,.05],[392,.7,1.6,.07],[349.2,1.2,1.4,.06]].forEach(([f,d,dur,v])=>{
      const o=ctx.createOscillator(),g=ctx.createGain(),lfo=ctx.createOscillator(),lfog=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+d);
      lfo.frequency.setValueAtTime(4.5,t+d);lfo.type='sine';lfog.gain.setValueAtTime(f*.008,t+d);
      lfo.connect(lfog);lfog.connect(o.frequency);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(v,t+d+.15);g.gain.exponentialRampToValueAtTime(.0001,t+d+dur);
      o.connect(g);g.connect(rev);lfo.start(t+d);lfo.stop(t+d+dur+.1);o.start(t+d);o.stop(t+d+dur+.1);
    });
    [698.4,1046.5].forEach(f=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.03,t+.6);g.gain.exponentialRampToValueAtTime(.0001,t+3);
      o.connect(g);g.connect(rev);o.start(t);o.stop(t+3.5);
    });
  },
  // MIZU — abu: hening, noise air, tetes kristal lambat
  MIZU:(ctx)=>{
    const t=ctx.currentTime,rev=makeReverb(ctx,4,1),mg=ctx.createGain();
    mg.gain.setValueAtTime(.25,t);rev.connect(mg);mg.connect(ctx.destination);
    const bs=ctx.sampleRate*3,nb=ctx.createBuffer(1,bs,ctx.sampleRate),nd=nb.getChannelData(0);
    for(let i=0;i<bs;i++)nd[i]=Math.random()*2-1;
    const nn=ctx.createBufferSource(),nf=ctx.createBiquadFilter(),ng=ctx.createGain();
    nn.buffer=nb;nf.type='bandpass';nf.frequency.setValueAtTime(600,t);nf.Q.setValueAtTime(.5,t);
    ng.gain.setValueAtTime(0,t);ng.gain.linearRampToValueAtTime(.08,t+1);ng.gain.exponentialRampToValueAtTime(.0001,t+3.5);
    nn.connect(nf);nf.connect(ng);ng.connect(rev);nn.start(t);nn.stop(t+4);
    [[220,0,3.5],[277.18,.8,2.8],[329.63,1.6,2.2]].forEach(([f,d,dr])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+d);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.07,t+d+.6);g.gain.exponentialRampToValueAtTime(.0001,t+d+dr);
      o.connect(g);g.connect(rev);o.start(t+d);o.stop(t+d+dr+.1);
    });
    [[1046.5,.5,.6],[880,1.4,.7],[1174.66,2.2,.5]].forEach(([f,d,dr])=>osc(ctx,'sine',f,t+d,dr,.05));
  },
  // PULU — hijau: meluap, sweep naik, pecah cerah
  PULU:(ctx)=>{
    const t=ctx.currentTime,rev=makeReverb(ctx,2,1.8),mg=ctx.createGain();
    mg.gain.setValueAtTime(.28,t);rev.connect(mg);mg.connect(ctx.destination);
    const sw=ctx.createOscillator(),sg=ctx.createGain();
    sw.type='sine';sw.frequency.setValueAtTime(80,t);sw.frequency.exponentialRampToValueAtTime(400,t+1.5);
    sg.gain.setValueAtTime(0,t);sg.gain.linearRampToValueAtTime(.15,t+.1);sg.gain.exponentialRampToValueAtTime(.0001,t+1.8);
    sw.connect(sg);sg.connect(rev);sw.start(t);sw.stop(t+2);
    [[392,.3,.9],[493.88,.5,1],[587.33,.7,1.1],[739.99,.95,1.2],[880,1.2,1.4],[1174.66,1.5,1.0]].forEach(([f,d,dr])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle';o.frequency.setValueAtTime(f,t+d);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.12,t+d+.04);g.gain.exponentialRampToValueAtTime(.0001,t+d+dr);
      o.connect(g);g.connect(rev);o.start(t+d);o.stop(t+d+dr+.1);
    });
    [784,1046.5,1318.5].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+.2);o.detune.setValueAtTime(i*8,t+.2);
      g.gain.setValueAtTime(0,t+.2);g.gain.linearRampToValueAtTime(.04,t+.6);g.gain.exponentialRampToValueAtTime(.0001,t+3.2);
      o.connect(g);g.connect(rev);o.start(t+.2);o.stop(t+3.5);
    });
  },
  // AL — abu gelap: stark, resonansi ruang gelap, klik & disonan
  AL:(ctx)=>{
    const t=ctx.currentTime,rev=makeReverb(ctx,3.5,2.5),mg=ctx.createGain();
    mg.gain.setValueAtTime(.3,t);rev.connect(mg);mg.connect(ctx.destination);
    const lo=ctx.createOscillator(),lg=ctx.createGain();
    lo.type='sine';lo.frequency.setValueAtTime(55,t);
    lg.gain.setValueAtTime(0,t);lg.gain.linearRampToValueAtTime(.4,t+.4);lg.gain.exponentialRampToValueAtTime(.0001,t+4);
    lo.connect(lg);lg.connect(rev);lo.start(t);lo.stop(t+4.5);
    [[110,.6,1.8],[155.56,1.2,1.5],[164.81,1.8,1.2],[130.81,2.4,1.0]].forEach(([f,d,dr])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(f,t+d);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.06,t+d+.1);g.gain.exponentialRampToValueAtTime(.0001,t+d+dr);
      o.connect(g);g.connect(rev);o.start(t+d);o.stop(t+d+dr+.1);
    });
    const ib=ctx.createBuffer(1,ctx.sampleRate*.08,ctx.sampleRate),id=ib.getChannelData(0);
    for(let i=0;i<id.length;i++)id[i]=Math.random()*(1-i/id.length)*.6;
    const is=ctx.createBufferSource(),ig=ctx.createGain();
    is.buffer=ib;ig.gain.setValueAtTime(.25,t);is.connect(ig);ig.connect(ctx.destination);is.start(t);
  }
};

// ── CHAR DATA ──
const chars={
  MIO:{color:'#f0f4ff',role:'Metakognisi · Pusat Kendali',tagline:'Memahami pola & proses berpikir. Kesadaran mendahului segalanya.',transmission:'COGNITIVE AWARENESS SYSTEM · ONLINE',
    symbol:`<circle cx="80" cy="80" r="60" fill="none" stroke="currentColor" stroke-width="1" opacity=".3"/>
      <ellipse cx="80" cy="80" rx="55" ry="28" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="18" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="80" cy="80" r="6" fill="currentColor"/>
      <line x1="80" y1="20" x2="80" y2="52" stroke="currentColor" stroke-width="1" opacity=".6"/>
      <line x1="80" y1="108" x2="80" y2="140" stroke="currentColor" stroke-width="1" opacity=".6"/>
      <line x1="25" y1="80" x2="57" y2="80" stroke="currentColor" stroke-width="1" opacity=".6"/>
      <line x1="103" y1="80" x2="135" y2="80" stroke="currentColor" stroke-width="1" opacity=".6"/>
      <circle cx="80" cy="80" r="38" fill="none" stroke="currentColor" stroke-width=".5" stroke-dasharray="4 4" opacity=".4"/>`,
    aksara:`<g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="20" y1="38" x2="20" y2="10"/><line x1="20" y1="10" x2="35" y2="26"/>
      <line x1="35" y1="26" x2="50" y2="10"/><line x1="50" y1="10" x2="50" y2="38"/>
      <line x1="15" y1="38" x2="55" y2="38"/>
      <line x1="80" y1="10" x2="80" y2="38"/><line x1="72" y1="10" x2="88" y2="10"/>
      <line x1="72" y1="38" x2="88" y2="38"/><circle cx="80" cy="24" r="5" stroke-width="1.5" opacity=".6"/>
      <path d="M105 24 L115 10 L135 10 L145 24 L135 38 L115 38 Z" stroke-width="1.5"/>
      <circle cx="125" cy="24" r="4" fill="currentColor" opacity=".5"/></g>`},
  PENA:{color:'#4a8edb',role:'Struktur · Pengarah',tagline:'Menyusun & merencanakan. Tanpa arah, kecerdasan kehilangan bentuk.',transmission:'STRATEGIC FRAMEWORK · INITIALIZED',
    symbol:`<polygon points="80,15 145,115 15,115" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <polygon points="80,35 125,105 35,105" fill="none" stroke="currentColor" stroke-width="1" opacity=".5"/>

// ── SUMMON ──
let stTimeout=null;
const input=document.getElementById('codeInput');
const stage=document.getElementById('stage');
const statusEl=document.getElementById('status');

input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const code=input.value.trim().toUpperCase();
    if(chars[code]) summon(code);
    else if(code.length>0){
      document.getElementById('errorFlash').classList.add('show');
      setTimeout(()=>document.getElementById('errorFlash').classList.remove('show'),200);
      setStatus('KODE TIDAK DIKENAL · MIO / PENA / VANIA / MIZU / PULU / AL');
    }
  }
});

function setStatus(msg){statusEl.textContent=msg;clearTimeout(stTimeout);stTimeout=setTimeout(()=>statusEl.textContent='',3000);}

function summon(code){
  const ch=chars[code];if(!ch)return;
  input.value='';
  try{sounds[code](getCtx());}catch(e){}
  stage.style.display='flex';setTimeout(()=>stage.classList.add('active'),10);
  const sym=document.getElementById('holoSymbol'),info=document.getElementById('charInfo');
  const scan=document.getElementById('holoScan'),wrap=document.getElementById('holoWrap');
  const tx=document.getElementById('transmission');
  sym.classList.remove('visible');info.classList.remove('visible');
  sym.style.color=ch.color;sym.innerHTML=ch.symbol;scan.style.color=ch.color;
  document.getElementById('charLatin').textContent=code;
  document.getElementById('charLatin').style.color=ch.color;
  document.getElementById('charRole').textContent=ch.role;
  document.getElementById('charRole').style.color=ch.color;
  document.getElementById('charTagline').textContent=ch.tagline;
  const aksaraSvg=document.getElementById('aksaraSvg');
  aksaraSvg.innerHTML=ch.aksara;
  aksaraSvg.querySelectorAll('*').forEach(el=>{
    const f=el.getAttribute('fill');
    if(!f||f==='none')el.style.stroke=ch.color;
    else{el.style.fill=ch.color;el.style.stroke=ch.color;}
  });
  tx.textContent='';typeText(tx,ch.transmission,28);
  buildRings(wrap,ch.color);spawnParticles(wrap,ch.color);
  scan.style.animation='none';scan.offsetHeight;scan.style.animation='scanMove 2.2s linear infinite';
  setTimeout(()=>{sym.classList.add('visible');setTimeout(()=>info.classList.add('visible'),350);},500);
}

function buildRings(wrap,color){
  wrap.querySelectorAll('.dr,.dp').forEach(r=>r.remove());
  [{s:240,dash:false,rot:'ringRotate 9s linear infinite',op:.35},
   {s:185,dash:true,rot:'ringRotateCCW 6s linear infinite',op:.25},
   {s:130,dash:true,rot:'ringRotate 4s linear infinite',op:.18}
  ].forEach(({s,dash,rot,op})=>{
    const r=document.createElement('div');r.className='dr';
    r.style.cssText=`position:absolute;width:${s}px;height:${s}px;border-radius:50%;border:1px ${dash?'dashed':'solid'} ${color};opacity:${op};animation:${rot};box-shadow:0 0 10px ${color}18;`;
    wrap.insertBefore(r,wrap.firstChild);
  });
  const p=document.createElement('div');p.className='dp';
  p.style.cssText=`position:absolute;width:260px;height:260px;border-radius:50%;border:1px solid ${color};animation:ringExpand 2.2s ease-out infinite;opacity:0;`;
  wrap.insertBefore(p,wrap.firstChild);
}

function spawnParticles(wrap,color){
  wrap.querySelectorAll('.particle').forEach(p=>p.remove());
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='particle';
    const a=Math.random()*360,d=60+Math.random()*90;
    p.style.cssText=`background:${color};position:absolute;width:2px;height:2px;border-radius:50%;left:50%;top:50%;--tx:${Math.cos(a*Math.PI/180)*d}px;--ty:${Math.sin(a*Math.PI/180)*d}px;animation:particleFly ${.7+Math.random()*1.1}s ease-out ${Math.random()*.4}s forwards;`;
    wrap.appendChild(p);
  }
}

function typeText(el,text,delay){
  let i=0;el.textContent='';
  const iv=setInterval(()=>{el.textContent+=text[i];i++;if(i>=text.length)clearInterval(iv);},delay);
}

function closeStage(){
  document.getElementById('charInfo').classList.remove('visible');
  document.getElementById('holoSymbol').classList.remove('visible');
  stage.classList.remove('active');
  setTimeout(()=>{
    stage.style.display='none';
    document.getElementById('holoWrap').querySelectorAll('.dr,.dp,.particle').forEach(el=>el.remove());
  },400);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeStage();});
